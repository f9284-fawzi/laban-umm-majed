<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام لبن</title>

<style>
body {font-family: Arial; background:#f2f2f2; margin:0; padding:10px;}
.container {max-width:360px; margin:auto; background:#fff; padding:15px; border-radius:12px;}

.header {text-align:center;}
.header img {width:80px;}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
}

button {
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
}

.invoice {
  border:1px solid #000;
  padding:10px;
  margin-top:10px;
  font-size:14px;
}

.report {
  background:#eee;
  padding:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
</div>

<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<input type="number" id="small" placeholder="عدد الصغير">
<input type="number" id="big" placeholder="عدد الكبير">

<button onclick="generate()">إنشاء فاتورة</button>
<button onclick="quick()">فاتورة سريعة</button>

<div id="invoiceArea"></div>

<button onclick="sendWhatsApp()">إرسال واتساب</button>

<button onclick="showReport()">عرض التقرير</button>

<div id="reportArea"></div>

</div>

<script>

let text = "";

function saveData(s,b){
let sTotal = Number(localStorage.getItem("small"))||0;
let bTotal = Number(localStorage.getItem("big"))||0;

localStorage.setItem("small", sTotal + s);
localStorage.setItem("big", bTotal + b);
}

function generate(){
let shop = document.getElementById("shop").value;
let s = Number(document.getElementById("small").value||0);
let b = Number(document.getElementById("big").value||0);

let total = (s*5)+(b*10);
let date = new Date().toLocaleString('ar-EG');

saveData(s,b);

text = `فاتورة
المحل: ${shop}
صغير: ${s}
كبير: ${b}
الإجمالي: ${total}`;

document.getElementById("invoiceArea").innerHTML = `
<div class="invoice" id="invoice">
المحل: ${shop}<br>
${date}<br><br>
صغير: ${s}<br>
كبير: ${b}<br>
<b>الإجمالي: ${total} ريال</b>
</div>`;
}

function quick(){
document.getElementById("small").value = 10;
document.getElementById("big").value = 5;
generate();
}

function sendWhatsApp(){
let url = "https://wa.me/?text=" + encodeURIComponent(text);
window.open(url);
}

function showReport(){
let s = Number(localStorage.getItem("small"))||0;
let b = Number(localStorage.getItem("big"))||0;

let total = (s*5)+(b*10);

document.getElementById("reportArea").innerHTML = `
<div class="report">
صغير: ${s}<br>
كبير: ${b}<br>
<b>الإجمالي: ${total} ريال</b>
</div>`;
}

</script>

</body>
</html>
