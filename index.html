<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ألبان أم ماجد</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body {font-family:Tahoma;margin:0;background:#f4f4f4;}
.container {width:100%;min-height:100vh;background:#fff;padding:20px;box-sizing:border-box;}
.header {text-align:center;margin-bottom:20px;}
.logo {width:120px;margin-bottom:10px;}
h1 {margin:5px;}
.table {width:100%;border-collapse:collapse;margin-top:15px;}
.table th,.table td {border:1px solid #ddd;padding:10px;text-align:center;}
button {width:100%;padding:12px;margin:5px 0;background:#000;color:#fff;border:none;border-radius:6px;font-size:16px;}
select,input {width:100%;padding:10px;margin:5px 0;font-size:16px;text-align:center;}
.total {font-size:22px;font-weight:bold;text-align:center;margin-top:10px;}
</style>
</head>
<body>

<div class="container" id="invoice">

<div class="header">
<img src="logo.png" class="logo">
<h1>ألبان أم ماجد</h1>
</div>

<select id="customer" onchange="setPhone()">
<option value="الدخيل" data-phone="966559355652">الدخيل</option>
<option value="طلعة يوم ودوم" data-phone="966510863022">طلعة يوم ودوم</option>
<option value="طلعتك ازهلها" data-phone="966553392246">طلعتك ازهلها</option>
</select>

<input id="phone" placeholder="رقم العميل">

<table class="table">
<thead>
<tr>
<th>المنتج</th>
<th>العدد</th>
<th>السعر</th>
<th>المجموع</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<button onclick="addItem()">➕ إضافة منتج</button>

<div class="total">المجموع الكلي: <span id="total">0</span> ريال</div>

<button onclick="calc()">حساب</button>
<button onclick="sendWhatsApp()">📲 واتساب</button>
<button onclick="download()">🖨️ تحميل الفاتورة</button>

</div>

<script>

function setPhone(){
let sel=document.getElementById("customer");
let phone=sel.options[sel.selectedIndex].dataset.phone;
document.getElementById("phone").value=phone;
}

function addItem(){
let row=document.createElement("tr");
row.innerHTML=`
<td>
<select class="product">
<option>لبن</option>
<option>بقل</option>
<option>زبدة</option>
<option>زبادي</option>
<option>جبن</option>
<option>سمن</option>
</select>
</td>
<td><input type="number" class="q"></td>
<td><input type="number" class="p"></td>
<td class="sub">0</td>`;
document.getElementById("items").appendChild(row);
}

function calc(){
let rows=document.querySelectorAll("#items tr");
let total=0;
rows.forEach(r=>{
let q=r.querySelector(".q").value||0;
let p=r.querySelector(".p").value||0;
let sub=q*p;
r.querySelector(".sub").innerText=sub;
total+=sub;
});
document.getElementById("total").innerText=total;
}

function buildMsg(){
let rows=document.querySelectorAll("#items tr");
let customer=document.getElementById("customer").value;
let total=document.getElementById("total").innerText;
let date=new Date().toLocaleDateString();

let msg=`فاتورة ألبان أم ماجد\n${customer}\n${date}\n\n`;
rows.forEach(r=>{
let pr=r.querySelector(".product").value;
let q=r.querySelector(".q").value;
let p=r.querySelector(".p").value;
let s=r.querySelector(".sub").innerText;
if(q){ msg+=`${pr} - ${q} × ${p} = ${s}\n`; }
});
msg+=`\nالمجموع: ${total}`;
return msg;
}

function sendWhatsApp(){
let msg=buildMsg();
let phone=document.getElementById("phone").value;
let my="966503039284";
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
window.open("https://wa.me/"+my+"?text="+encodeURIComponent(msg));
}

function download(){
html2canvas(document.getElementById("invoice")).then(c=>{
let a=document.createElement("a");
a.href=c.toDataURL();
a.download="invoice.png";
a.click();
});
}

setPhone();

</script>

</body>
</html>
