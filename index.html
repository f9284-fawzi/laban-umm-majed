<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لبن أم ماجد</title>

<style>
body {font-family: Arial; background:#eee; padding:10px;}
.container {max-width:420px; margin:auto; background:#fff; padding:15px; border-radius:15px;}

.header {text-align:center;}
.header h2 {margin:0;}
.header hr {margin:5px 0;}

.invoice {
  border:2px solid black;
  border-radius:15px;
  padding:10px;
  margin-top:10px;
}

.title {
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.box {
  border:1px solid #ccc;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.row {display:flex; justify-content:space-between; margin:5px 0;}

.table {
  width:100%;
  border-collapse:collapse;
}

.table th, .table td {
  border:1px solid black;
  padding:8px;
  text-align:center;
}

.table th {
  background:black;
  color:white;
}

.total {
  background:black;
  color:white;
  padding:10px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>أم ماجد</h2>
<hr>
<h3>لبن ماعز طازج</h3>
<div>%100 طبيعي</div>
</div>

<label>اسم المحل</label>
<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<label>عدد الصغير</label>
<input type="number" id="small">

<label>عدد الكبير</label>
<input type="number" id="big">

<button onclick="generate()">إنشاء فاتورة</button>

<div id="result"></div>

<button onclick="send()">إرسال واتساب</button>

</div>

<script>

let text="";

function generate(){

let shop=document.getElementById("shop").value;
let s=document.getElementById("small").value||0;
let b=document.getElementById("big").value||0;

let totalSmall=s*5;
let totalBig=b*10;
let total=totalSmall+totalBig;

let date=new Date().toLocaleDateString('ar-EG');
let no=Date.now();

text=`فاتورة لبن أم ماجد
المحل: ${shop}
التاريخ: ${date}
صغير: ${s}
كبير: ${b}
الإجمالي: ${total}`;

document.getElementById("result").innerHTML=`

<div class="invoice">

<div class="title">فاتورة</div>

<div class="box">
<div class="row"><div>رقم الفاتورة</div><div>${no}</div></div>
<div class="row"><div>التاريخ</div><div>${date}</div></div>
<div class="row"><div>المحل</div><div>${shop}</div></div>
</div>

<table class="table">
<tr>
<th>الصنف</th>
<th>العدد</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

<tr>
<td>لبن صغير</td>
<td>${s}</td>
<td>5</td>
<td>${totalSmall}</td>
</tr>

<tr>
<td>لبن كبير</td>
<td>${b}</td>
<td>10</td>
<td>${totalBig}</td>
</tr>

</table>

<div class="total">الإجمالي: ${total} ريال</div>

<br>

<div>ملاحظات:</div>
<hr>

<div style="text-align:center;margin-top:10px;">
شكراً لتعاملكم معنا
</div>

</div>
`;
}

function send(){
let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

</script>

</body>
</html>
