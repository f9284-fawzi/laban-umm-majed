<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ألبان أم ماجد</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body {font-family:Tahoma;background:#f2f2f2;text-align:center;}
.container {width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px #ccc;}
h2 {margin-bottom:10px;}
input,select {width:90%;padding:10px;margin:5px;text-align:center;font-size:16px;}
button {width:95%;padding:12px;margin:5px;background:black;color:white;border:none;border-radius:6px;font-size:16px;}
.total {font-size:22px;font-weight:bold;margin-top:10px;}
.row {border-bottom:1px dashed #ccc;padding:5px;}
</style>
</head>
<body>

<div class="container" id="invoice">

<h2>ألبان أم ماجد</h2>

<select id="customer">
<option>الدخيل</option>
<option>طلعتك ازهلها</option>
<option>طلعت يوم ودوم</option>
</select>

<div id="items"></div>

<button onclick="addItem()">➕ إضافة منتج</button>

<div class="total">المجموع الكلي: <span id="total">0</span> ريال</div>

<button onclick="calc()">حساب</button>
<button onclick="sendWhatsApp()">📲 واتساب</button>
<button onclick="sendEmail()">📧 ايميل</button>

</div>

<script>

function addItem(){
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<select class="product">
<option>لبن</option>
<option>بقل</option>
<option>زبدة</option>
<option>زبادي</option>
<option>جبن</option>
<option>سمن</option>
</select>
<input type="number" placeholder="العدد" class="q">
<input type="number" placeholder="السعر" class="p">`;
document.getElementById("items").appendChild(d);
}

function calc(){
let q=document.querySelectorAll(".q");
let p=document.querySelectorAll(".p");
let t=0;
for(let i=0;i<q.length;i++){
t+=(q[i].value||0)*(p[i].value||0);
}
document.getElementById("total").innerText=t;
}

function buildMessage(){
let customer=document.getElementById("customer").value;
let products=document.querySelectorAll(".product");
let q=document.querySelectorAll(".q");
let p=document.querySelectorAll(".p");
let total=document.getElementById("total").innerText;
let date=new Date().toLocaleDateString();

let msg=`فاتورة ألبان أم ماجد\n`;
msg+=`العميل: ${customer}\n`;
msg+=`التاريخ: ${date}\n\n`;

for(let i=0;i<products.length;i++){
if(q[i].value){
msg+=`${products[i].value} - عدد: ${q[i].value} - سعر: ${p[i].value}\n`;
}
}

msg+=`\nالمجموع الكلي: ${total} ريال`;
return msg;
}

function sendWhatsApp(){
let msg=buildMessage();
window.open("https://wa.me/966503039284?text="+encodeURIComponent(msg));
}

function sendEmail(){
let msg=buildMessage();
window.location.href=`mailto:f9284@hotmail.com?subject=فاتورة&body=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
