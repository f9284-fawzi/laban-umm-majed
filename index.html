<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاتورة</title>

<style>
body {
  font-family: monospace;
  background:#eee;
  padding:10px;
  font-size:14px;
}

.container {
  max-width:300px;
  margin:auto;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.header {
  text-align:center;
}

.header img {
  width:80px;
}

input, select, button {
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:14px;
}

.invoice {
  border-top:2px dashed black;
  border-bottom:2px dashed black;
  padding:8px;
  margin-top:10px;
}

.center {text-align:center;}

.line {
  border-top:1px dashed #000;
  margin:5px 0;
}

button {
  background:black;
  color:white;
  border:none;
}
</style>

<style>
@media print {
  body * {display:none;}
  #invoice, #invoice * {display:block;}

  #invoice {
    position:absolute;
    top:0;
    right:0;
    width:100%;
  }
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
</div>

<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<input type="number" id="small" placeholder="صغير">
<input type="number" id="big" placeholder="كبير">

<button onclick="generate()">إنشاء</button>

<div id="invoiceArea"></div>

<button onclick="window.print()">طباعة</button>

</div>

<script>
function generate(){

let s = Number(document.getElementById("small").value||0);
let b = Number(document.getElementById("big").value||0);
let shop = document.getElementById("shop").value;

let total = (s*5)+(b*10);
let date = new Date().toLocaleDateString('ar-EG');

document.getElementById("invoiceArea").innerHTML = `
<div class="invoice" id="invoice">

<div class="center">
<img src="logo.png" width="70"><br>
فاتورة
</div>

<div class="line"></div>

المحل: ${shop}<br>
التاريخ: ${date}

<div class="line"></div>

صغير: ${s} × 5 = ${s*5}<br>
كبير: ${b} × 10 = ${b*10}

<div class="line"></div>

<b>الإجمالي: ${total} ريال</b>

<div class="line"></div>

<div class="center">
شكراً لكم
</div>

</div>
`;
}
</script>

</body>
</html>
