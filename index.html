<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لبن أم ماجد</title>
<style>
body {font-family: Arial; background:#eee; padding:10px;}
.container {max-width:420px; margin:auto; background:#fff; padding:15px; border-radius:15px;}
.header {text-align:center;}
.invoice {border:2px solid black; border-radius:15px; padding:10px; margin-top:10px;}
.table {width:100%; border-collapse:collapse;}
.table th, .table td {border:1px solid black; padding:8px; text-align:center;}
.table th {background:black; color:white;}
.total {background:black; color:white; padding:10px; text-align:center; font-weight:bold;}
button {width:100%; padding:10px; margin-top:10px; background:black; color:white; border:none; border-radius:8px;}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h2>أم ماجد</h2>
<img src="logo.png" width="120">
<div>لبن ماعز طازج</div>
<div>%100 طبيعي</div>
</div>

<label>المحل</label>
<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<label>صغير</label>
<input type="number" id="small">

<label>كبير</label>
<input type="number" id="big">

<button onclick="generate()">إنشاء فاتورة</button>
<div id="result"></div>

<button onclick="showInventory()">عرض الجرد</button>
<div id="inventory"></div>

</div>

<script>

function saveInventory(small, big){
let totalSmall = Number(localStorage.getItem("small")) || 0;
let totalBig = Number(localStorage.getItem("big")) || 0;

localStorage.setItem("small", totalSmall + small);
localStorage.setItem("big", totalBig + big);
}

function generate(){
let s = Number(document.getElementById("small").value || 0);
let b = Number(document.getElementById("big").value || 0);

let total = (s*5)+(b*10);

saveInventory(s,b);

document.getElementById("result").innerHTML = `
<div class="invoice">
فاتورة<br>
صغير: ${s}<br>
كبير: ${b}<br>
الإجمالي: ${total} ريال
</div>`;
}

function showInventory(){
let small = Number(localStorage.getItem("small")) || 0;
let big = Number(localStorage.getItem("big")) || 0;

let total = (small*5)+(big*10);

document.getElementById("inventory").innerHTML = `
<div class="invoice">
<h3>الجرد</h3>
صغير: ${small}<br>
كبير: ${big}<br>
الإجمالي: ${total} ريال
</div>`;
}

</script>

</body>
</html>
