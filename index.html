<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام لبن</title>

<style>
body {font-family: Arial; margin:0; background:#f2f2f2;}
.container {max-width:100%; padding:15px;}
input,select,button{width:100%;padding:10px;margin:5px 0;font-size:16px}
button{background:#000;color:#fff;border:none}
.invoice{background:#fff;padding:10px;margin-top:10px;border:1px solid #000}
</style>

</head>
<body>

<div class="container">

<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<input type="number" id="small" placeholder="صغير">
<input type="number" id="big" placeholder="كبير">

<button onclick="generate()">إنشاء فاتورة</button>

<div id="invoiceArea"></div>

<button onclick="send()">إرسال واتساب</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmONCqISPVhlvfNZY5YJzKX4js5UdjtVM",
  authDomain: "fawzi-alanazi.firebaseapp.com",
  projectId: "fawzi-alanazi",
  storageBucket: "fawzi-alanazi.firebasestorage.app",
  messagingSenderId: "833677445281",
  appId: "1:833677445281:web:f7681f44d1efd7d02c08e0",
  measurementId: "G-9F43PMY4J3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.generate = async function(){
let s = Number(document.getElementById("small").value||0);
let b = Number(document.getElementById("big").value||0);
let shop = document.getElementById("shop").value;

let total = (s*5)+(b*10);
let date = new Date().toLocaleString('ar-EG');

await addDoc(collection(db,"invoices"),{
shop, small:s, big:b, total, date
});

window.text = `فاتورة
المحل: ${shop}
صغير: ${s}
كبير: ${b}
الإجمالي: ${total}`;

document.getElementById("invoiceArea").innerHTML =
`<div class="invoice">
${date}<br>
${shop}<br>
صغير:${s}<br>
كبير:${b}<br>
<b>${total} ريال</b>
</div>`;
}

window.send = function(){
window.open("https://wa.me/?text="+encodeURIComponent(window.text));
}
</script>

</body>
</html>
