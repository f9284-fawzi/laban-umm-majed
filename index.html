<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لبن ماعز طازج</title>

<style>
body {font-family: Arial; background:#eee; padding:15px; font-size:18px;}
.container {max-width:420px; margin:auto; background:#fff; padding:20px; border-radius:15px;}
.header {text-align:center; margin-bottom:15px;}
.header img {width:160px;}
label {margin-top:10px; display:block;}
input, select {width:100%; padding:12px; margin:8px 0; font-size:18px;}
.invoice {border:2px solid black; padding:15px; margin-top:15px;}
.table {width:100%; border-collapse:collapse;}
.table th, .table td {border:1px solid black; padding:10px; text-align:center;}
.table th {background:black; color:white;}
.total {background:black; color:white; padding:12px; text-align:center; font-weight:bold;}
button {width:100%; padding:12px; margin-top:10px; background:black; color:white; border:none; font-size:18px;}
</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
</div>

<label>المحل</label>
<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<label>عدد الصغير</label>
<input type="number" id="small">

<label>عدد الكبير</label>
<input type="number" id="big">

<button onclick="generate()">إنشاء الفاتورة</button>

<div id="invoiceArea"></div>

<button onclick="printAndSend()">طباعة + واتساب</button>

</div>

<script>

let text = "";

function generate(){
let shop = document.getElementById("shop").value;
let s = Number(document.getElementById("small").value || 0);
let b = Number(document.getElementById("big").value || 0);

let total = (s*5)+(b*10);

let date = new Date().toLocaleDateString('ar-EG');
let no = Date.now();

text = `فاتورة
المحل: ${shop}
التاريخ: ${date}
صغير: ${s}
كبير: ${b}
الإجمالي: ${total} ريال`;

document.getElementById("invoiceArea").innerHTML = `
<div class="invoice" id="invoice">
<img src="logo.png" width="100" style="display:block;margin:auto;">
<h3 style="text-align:center;">فاتورة</h3>
<div>رقم: ${no}</div>
<div>التاريخ: ${date}</div>
<div>المحل: ${shop}</div>

<table class="table">
<tr><th>الصنف</th><th>العدد</th><th>السعر</th><th>الإجمالي</th></tr>
<tr><td>صغير</td><td>${s}</td><td>5</td><td>${s*5}</td></tr>
<tr><td>كبير</td><td>${b}</td><td>10</td><td>${b*10}</td></tr>
</table>

<div class="total">الإجمالي: ${total} ريال</div>
</div>`;
}

function printAndSend(){
window.print();

setTimeout(()=>{
let url = "https://wa.me/?text=" + encodeURIComponent(text);
window.open(url,"_blank");
},2000);
}

</script>

</body>
</html>
