<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الفواتير</title>

<style>
body {font-family: Arial; background:#f2f2f2; padding:15px; font-size:16px;}
.container {max-width:420px; margin:auto; background:#fff; padding:18px; border-radius:15px;}
.header {text-align:center; margin-bottom:10px;}
.header img {width:130px;}

label {margin-top:8px; display:block;}
input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  font-size:16px;
}

.invoice {
  border:2px solid #000;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
}

.table {
  width:100%;
  border-collapse:collapse;
  margin-top:8px;
}

.table th, .table td {
  border:1px solid #000;
  padding:8px;
  text-align:center;
  font-size:15px;
}

.table th {
  background:#000;
  color:#fff;
}

.total {
  background:#000;
  color:#fff;
  padding:10px;
  text-align:center;
  font-weight:bold;
  margin-top:8px;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#000;
  color:#fff;
  border:none;
  font-size:16px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
</div>

<label>المحل</label>
<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<label>الصغير</label>
<input type="number" id="small">

<label>الكبير</label>
<input type="number" id="big">

<button onclick="generate()">إنشاء الفاتورة</button>

<div id="invoiceArea"></div>

<button onclick="printInvoice()">طباعة الفاتورة</button>
<button onclick="sendWhatsApp()">إرسال واتساب</button>

</div>

<script>

let text = "";

function generate(){
let shop = document.getElementById("shop").value;
let s = Number(document.getElementById("small").value || 0);
let b = Number(document.getElementById("big").value || 0);

let total = (s*5)+(b*10);
let date = new Date().toLocaleDateString('ar-EG');
let no = new Date().getTime();

text = `فاتورة
المحل: ${shop}
التاريخ: ${date}
صغير: ${s}
كبير: ${b}
الإجمالي: ${total} ريال`;

document.getElementById("invoiceArea").innerHTML = `
<div class="invoice" id="invoice">
<img src="logo.png" width="90" style="display:block;margin:auto;">
<h3 style="text-align:center;">فاتورة</h3>

<div>رقم: ${no}</div>
<div>التاريخ: ${date}</div>
<div>المحل: ${shop}</div>

<table class="table">
<tr><th>الصنف</th><th>العدد</th><th>السعر</th><th>الإجمالي</th></tr>
<tr><td>صغير</td><td>${s}</td><td>5</td><td>${s*5}</td></tr>
<tr><td>كبير</td><td>${b}</td><td>10</td><td>${b*10}</td></tr>
</table>

<div class="total">الإجمالي: ${total} ريال</div>
</div>
`;
}

function printInvoice(){
window.print();
}

function sendWhatsApp(){
let url = "https://wa.me/?text=" + encodeURIComponent(text);
window.open(url,"_blank");
}

</script>

</body>
</html>
