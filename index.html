<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ألبان أم ماجد</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body {font-family:Tahoma;background:#f2f2f2;text-align:center;}
.container {width:380px;margin:auto;background:#fff;padding:15px;border-radius:12px;}
input,select {width:85%;padding:6px;margin:5px;text-align:center;}
button {width:95%;padding:10px;margin:5px;background:black;color:white;border:none;border-radius:6px;}
.total {font-size:18px;font-weight:bold;}
</style>
</head>
<body>

<div class="container" id="invoice">

<h2>ألبان أم ماجد</h2>

<select id="customer">
<option>الدخيل</option>
<option>طلعتك ازهلها</option>
<option>طلعت يوم ودوم</option>
</select>

<div id="items"></div>

<button onclick="addItem()">➕ إضافة منتج</button>

<p class="total">المجموع: <span id="total">0</span> ريال</p>

<button onclick="calc()">حساب</button>
<button onclick="sendWhatsApp()">📲 واتساب</button>
<button onclick="sendEmail()">📧 ايميل</button>

</div>

<script>
function addItem(){
let d=document.createElement("div");
d.innerHTML=`
<select>
<option>لبن</option>
<option>بقل</option>
<option>زبدة</option>
<option>زبادي</option>
<option>جبن</option>
<option>سمن</option>
</select>
<input type="number" placeholder="عدد" class="q">
<input type="number" placeholder="سعر" class="p">`;
document.getElementById("items").appendChild(d);
}

function calc(){
let q=document.querySelectorAll(".q");
let p=document.querySelectorAll(".p");
let t=0;
for(let i=0;i<q.length;i++){
t+=(q[i].value||0)*(p[i].value||0);
}
document.getElementById("total").innerText=t;
}

function sendWhatsApp(){
let total=document.getElementById("total").innerText;
let customer=document.getElementById("customer").value;
let msg=`فاتورة ألبان أم ماجد\n${customer}\n${total} ريال`;
window.open("https://wa.me/966503039294?text="+encodeURIComponent(msg));
}

function sendEmail(){
let total=document.getElementById("total").innerText;
let customer=document.getElementById("customer").value;
let subject="فاتورة ألبان أم ماجد";
let body=`العميل: ${customer}\nالمجموع: ${total} ريال`;
window.location.href=`mailto:f9284@hotmail.com?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
