<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاتورة 80mm</title>

<style>
body {
  font-family: monospace;
  margin:0;
  padding:0;
}

.container {
  width:280px; /* مناسب لطابعة 80mm */
  margin:auto;
}

.header {
  text-align:center;
}

.header img {
  width:60px;
}

.invoice {
  font-size:13px;
  padding:5px;
}

.line {
  border-top:1px dashed #000;
  margin:5px 0;
}

.center {text-align:center;}

/* طباعة حرارية 80mm */
@media print {
  body * {visibility:hidden;}
  #invoice, #invoice * {visibility:visible;}

  #invoice {
    position:absolute;
    top:0;
    right:0;
    width:280px;
  }
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
</div>

<select id="shop">
<option>الدخيل</option>
<option>ازهلها</option>
<option>طلعة يوم</option>
</select>

<input type="number" id="small" placeholder="صغير">
<input type="number" id="big" placeholder="كبير">

<button onclick="generate()">إنشاء</button>

<div id="invoiceArea"></div>

<button onclick="window.print()">طباعة</button>

</div>

<script>
function generate(){

let s = Number(document.getElementById("small").value||0);
let b = Number(document.getElementById("big").value||0);
let shop = document.getElementById("shop").value;

let total = (s*5)+(b*10);
let date = new Date().toLocaleString('ar-EG');

document.getElementById("invoiceArea").innerHTML = `
<div id="invoice" class="invoice">

<div class="center">
<img src="logo.png" width="50"><br>
فاتورة
</div>

<div class="line"></div>

المحل: ${shop}<br>
التاريخ: ${date}

<div class="line"></div>

صغير ${s} × 5 = ${s*5}<br>
كبير ${b} × 10 = ${b*10}

<div class="line"></div>

<b>الإجمالي: ${total} ريال</b>

<div class="line"></div>

<div class="center">
شكراً لكم
</div>

</div>
`;
}
</script>

</body>
</html>
